version: 2.1

orbs:
  node: circleci/node@4.7.0

jobs:
  build_and_lhci:
    executor:
      name: node/default
      tag: 14.18.1
    steps:
      - checkout
      - node/install-packages
      - run: npm run build
      - run: |
          npm install -g @lhci/cli@0.8.2
          lhci autorun

workflows:
  lint-and-build:
    jobs:
      - node/run:
          name: Lint
          npm-run: lint
          version: 14.18.1
      - build_and_lhci
